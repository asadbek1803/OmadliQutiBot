<header class="d-flex justify-content-between align-items-center p-3" style="border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg-main); position: sticky; top: 0; z-index: 50;">
    <div class="d-flex align-items-center gap-2">
        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white shadow-soft" style="width: 42px; height: 42px; background: rgba(244,197,66,0.1); border: 1px solid rgba(244,197,66,0.3);">
            <i class="fa-solid fa-user" style="color: var(--accent-gold);"></i>
        </div>
        <div class="d-flex flex-column">
            <span id="user-name" class="fw-bold" style="font-size: 0.95rem;">...</span>
            <span id="user-level" class="badge rounded-pill mt-1" style="background: rgba(244,197,66,0.15); border: 1px solid rgba(244,197,66,0.4); color: var(--accent-gold); font-size: 0.65rem; width: fit-content;">🥉 Oltin</span>
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <!-- Notification Bell -->
        <div class="position-relative">
            <button class="btn btn-link p-2 position-relative" onclick="toggleNotifications()" style="color: var(--accent-gold);">
                <i class="fa-solid fa-bell" style="font-size: 1.2rem;"></i>
                <span id="notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.6rem; padding: 2px 5px;">0</span>
            </button>
            
            <!-- Notification Dropdown -->
            <div id="notification-dropdown" class="position-absolute end-0 mt-2" style="display: none; min-width: 320px; max-width: 400px;">
                <div class="premium-card">
                    <div class="d-flex justify-content-between align-items-center p-3 border-bottom" style="border-color: rgba(255,255,255,0.1);">
                        <h6 class="mb-0 text-white fw-bold">Bildirishnomalar</h6>
                        <button class="btn btn-sm btn-link text-warning p-0" onclick="markAllNotificationsRead()">Hammasini o'qildi</button>
                    </div>
                    <div id="notification-popup" style="max-height: 400px; overflow-y: auto;">
                        <!-- Notifications will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
        
        <div class="header-pill">
            <i class="fa-solid fa-coins" style="color: var(--accent-gold); font-size: 1.1rem;"></i>
            <span id="coin-balance" class="fw-bold" style="font-size: 1.1rem;">0</span>
        </div>
    </div>
</header>
