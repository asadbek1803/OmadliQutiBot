<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmadliQuti</title>
    <!-- Google Fonts for Modern Sans-Serif -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Premium Styles -->
    <link rel="stylesheet" href="/static/css/premium.css">
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="bg-ornament"></div>
    
    <div id="loader" class="d-flex align-items-center justify-content-center vh-100 flex-column" style="background: var(--bg-main); position: fixed; inset: 0; z-index: 9999;">
        <div class="spinner-border text-warning" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 text-secondary fw-bold">Yuklanmoqda...</p>
    </div>

    <div id="app" class="d-none w-100 h-100">
        {% block content %}{% endblock %}
    </div>

    <!-- Modals block (if any global modals exist) -->
    {% block modals %}{% endblock %}

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/spin.js"></script>
</body>
</html>
